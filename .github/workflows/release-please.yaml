# Release automation.
#
# Runs on every push to `main`. release-please maintains a rolling "release PR"
# that accumulates Conventional Commits into a Keep a Changelog entry and the
# SemVer bump. Merging that PR tags the release (v-prefixed) and creates the
# GitHub Release object.
#
# The witty opening paragraph required by the Release Notes Standard is added by
# the maintainer to the generated notes before publishing; release-please
# produces the structured body, the human adds the voice.
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # App credentials come from 1Password at runtime (single source of truth in
      # the Automation vault). Only OP_SERVICE_ACCOUNT_TOKEN lives as a repo secret;
      # the app id + private key never leave 1Password, so the shared App key is
      # rotated in one place instead of fanned out across repos as secrets.
      - name: Load app credentials from 1Password
        id: op
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RELEASE_PLEASE_APP_ID: 'op://Automation/rubicon-release-please-private-key/app id'
          RELEASE_PLEASE_APP_KEY: 'op://Automation/rubicon-release-please-private-key/private key'
      # Mint a token from the `rubicon-release-please` GitHub App. Commits authored
      # via an App token are auto-verified/signed by GitHub, so the release PR
      # satisfies `main`'s required-signed-commits rule (a PAT pushes unsigned bot
      # commits, which the branch protection rejects). The App token also triggers
      # CI, so required checks still run.
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ steps.op.outputs.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ steps.op.outputs.RELEASE_PLEASE_APP_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
