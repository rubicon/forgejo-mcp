# OpenSSF Scorecard — supply-chain and security-posture analysis.
# Publishes results to the OpenSSF Scorecard API and the repository's code
# scanning tab. Requires a public repository.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1" # weekly, Monday 04:23 UTC
  push:
    branches: [main]

# Least privilege at the top level; the analysis job elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the OpenSSF Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
