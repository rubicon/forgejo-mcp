# Pull-request policy enforcement.
#
# Required checks for branch protection on `main`:
#   "branch-name", "pr-title", "commitlint", "pr-links-issue".
#
# Enforces the General Repository Process Policy on every PR:
#   - branch name matches ^dev/<issue>-<slug>$
#   - PR title uses a Conventional Commits type
#   - every commit message uses a Conventional Commits type
#   - PR body links its issue with a closing keyword (Closes #N)
#
# Dependabot AND release-please are exempt from branch-name, commitlint, and
# pr-links-issue: dependabot branches are dependabot/*, release-please branches
# are release-please--*, neither links an issue, and their long commit bodies
# trip commitlint's body-max-line-length. Each of those jobs still runs and
# concludes green for these bots (via a passthrough step) so the required checks
# stay satisfied, while remaining fully enforced for human PRs. pr-title is not
# exempt: both bots' titles are already Conventional Commits.
name: PR Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Bot exempt (dependabot / release-please)
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'release-please--')
        run: echo "Dependabot PR; branch-name policy not applicable."
      - name: Validate branch name
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "Head branch: $HEAD_REF"
          if ! printf '%s' "$HEAD_REF" | grep -Eq '^dev/[0-9]+-[a-z0-9.-]+$'; then
            echo "::error::Branch '$HEAD_REF' must match ^dev/[0-9]+-[a-z0-9.-]+\$ (e.g. dev/12-add-list-branches-tool)"
            exit 1
          fi

  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with @commitlint/config-conventional (commitlint.config.mjs).
          types: |
            feat
            fix
            chore
            docs
            test
            ci
            refactor
            build
            perf
            revert
            style

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Bot exempt (dependabot / release-please)
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'release-please--')
        run: echo "Dependabot PR; commitlint not applicable."
      - uses: actions/checkout@v7
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
        with:
          fetch-depth: 0 # commitlint needs full history to lint the PR's commit range
      - uses: wagoid/commitlint-github-action@v6
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')

  pr-links-issue:
    name: pr-links-issue
    runs-on: ubuntu-latest
    steps:
      - name: Bot exempt (dependabot / release-please)
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'release-please--')
        run: echo "Dependabot PR; issue-link policy not applicable."
      - name: Verify PR body closes an issue
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'release-please--')
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s' "$PR_BODY" | grep -Eiq '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]+#[0-9]+'; then
            echo "::error::PR body must link its issue with a closing keyword, e.g. 'Closes #1'."
            exit 1
          fi
          echo "PR body links an issue."
